<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascend Chan Rules</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="classic-olive" data-font="tahoma">
    <main class="page board-page">
      <header class="topbar board-topbar">
        <div class="brand-block board-brand">
          <div class="brand-lockup board-lockup">
            <span class="site-logo" aria-hidden="true">
              <span class="crosshair-vert crosshair-long"></span>
              <span class="crosshair-horz crosshair-long"></span>
              <span class="crosshair-corner corner-top-left"></span>
              <span class="crosshair-corner corner-top-right"></span>
              <span class="crosshair-corner corner-bottom-left"></span>
              <span class="crosshair-corner corner-bottom-right"></span>
              <span class="crosshair-center"></span>
            </span>
            <h1 class="board-page-title">Rules</h1>
          </div>
        </div>

        <div class="toolbar">
          <a class="utility-button" href="index.html">Home</a>
          <button class="utility-button" type="button" id="customizeToggle">Customize</button>
        </div>
      </header>

      <div class="site-subnav" aria-label="Rules links">
        <a href="index.html">index</a>
      </div>

      <section class="thread-page-panel">
        <div class="section-title">Board rules</div>
        <div class="composer-grid">
          <p class="empty-state">Edit this page later with your actual rules.</p>
        </div>
      </section>
    </main>

    <aside class="panel hidden" id="customizePanel" aria-labelledby="customizeTitle">
      <div class="panel-header">
        <div>
          <h2 id="customizeTitle">Customize</h2>
          <p>Theme and font.</p>
        </div>
        <button class="close-button" type="button" data-close-panel="customizePanel">x</button>
      </div>

      <section class="panel-section">
        <h3>Themes</h3>
        <div class="theme-grid" id="themeGrid">
          <button class="theme-card" type="button" data-theme-option="classic-olive"><span class="theme-swatch theme-classic"></span><strong>Classic Olive</strong></button>
          <button class="theme-card" type="button" data-theme-option="amber-noir"><span class="theme-swatch theme-amber"></span><strong>Amber Noir</strong></button>
          <button class="theme-card" type="button" data-theme-option="mist-blue"><span class="theme-swatch theme-blue"></span><strong>Mist Blue</strong></button>
          <button class="theme-card" type="button" data-theme-option="blush-pink"><span class="theme-swatch theme-pink"></span><strong>Blush Pink</strong></button>
          <button class="theme-card" type="button" data-theme-option="violet-haze"><span class="theme-swatch theme-violet"></span><strong>Violet Haze</strong></button>
          <button class="theme-card" type="button" data-theme-option="minimal-dark"><span class="theme-swatch theme-dark"></span><strong>Minimal Dark</strong></button>
          <button class="theme-card" type="button" data-theme-option="retro-terminal"><span class="theme-swatch theme-retro"></span><strong>Retro Terminal</strong></button>
        </div>
      </section>

      <section class="panel-section">
        <h3>Font</h3>
        <label class="select-wrap" for="fontSelect">
          <span>Choose font</span>
          <select id="fontSelect">
            <option value="tahoma">Tahoma</option>
            <option value="verdana">Verdana</option>
            <option value="arial">Arial</option>
            <option value="trebuchet">Trebuchet MS</option>
            <option value="georgia">Georgia</option>
            <option value="courier">Courier New</option>
            <option value="jetbrains">JetBrainsMono Nerd Font</option>
            <option value="fira">FiraCode Nerd Font</option>
            <option value="iosevka">Iosevka Nerd Font</option>
            <option value="hack">Hack Nerd Font</option>
            <option value="cascadia">CaskaydiaCove Nerd Font</option>
            <option value="sauce">SauceCodePro Nerd Font</option>
            <option value="ubuntu">UbuntuMono Nerd Font</option>
          </select>
        </label>

        <label class="select-wrap" for="fontSizeRange">
          <span>Text size: <strong id="fontSizeValue">100%</strong></span>
          <input id="fontSizeRange" type="range" min="85" max="130" step="5" value="100" />
        </label>

        <div class="mode-grid">
          <button class="theme-card mode-card" type="button" data-font-weight="regular"><strong>Regular</strong></button>
          <button class="theme-card mode-card" type="button" data-font-weight="bold"><strong>Bold</strong></button>
          <button class="theme-card mode-card" type="button" data-font-weight="heavy"><strong>Heavy Bold</strong></button>
        </div>
      </section>

      <div class="panel-actions">
        <button class="utility-button primary-button" type="button" id="savePreferences">Save preferences</button>
        <button class="utility-button" type="button" id="resetPreferences">Reset</button>
      </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="window.__supabaseCdnFailed=true;"></script>
    <script>
      if (window.__supabaseCdnFailed) {
        document.write('<script src="https://unpkg.com/@supabase/supabase-js@2"><\/script>');
      }
    </script>
    <script src="supabase.js"></script>
    <script src="supabase-api.js"></script>
    <script src="reset.js"></script>
    <script src="rules.js"></script>
  </body>
</html>
